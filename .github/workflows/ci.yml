name: CI

on:
  push:
  pull_request:

env:
  ELIXIR_VERSION: "1.20.2-otp-29"
  OTP_VERSION: "29.0.3"
  FWUP_VERSION: "1.15.0"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install system deps
        run: |
          # libmnl-dev: the optional nerves_runtime dep pulls nerves_uevent,
          # whose C NIF #includes <libmnl/libmnl.h> and won't compile without it.
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmnl-dev

      - name: Install fwup
        run: |
          curl -fsSL "https://github.com/fwup-home/fwup/releases/download/v${FWUP_VERSION}/fwup_${FWUP_VERSION}_amd64.deb" -o /tmp/fwup.deb
          sudo dpkg -i /tmp/fwup.deb || sudo apt-get install -f -y

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      - name: Cache deps and _build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-mix-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Check formatting
        run: mix format --check-formatted

      # The :hardware-tagged fwup integration test spawns the real fwup
      # binary and streams a trivially small .fw; on fast runners fwup
      # consumes and exits before the terminator write lands, breaking the
      # pipe (:epipe). It's excluded here (as it was in the source app) and
      # exercised on real hardware instead. See ROBUSTNESS note re: :epipe.
      - name: Run tests
        run: mix test

      - name: Check for unused deps in mix.lock
        run: mix deps.unlock --check-unused

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install system deps
        run: |
          # nerves_runtime (optional dep) pulls nerves_uevent, whose C NIF
          # needs libmnl; dialyzer compiles it into the PLT.
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libmnl-dev

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: ${{ env.ELIXIR_VERSION }}
          otp-version: ${{ env.OTP_VERSION }}

      # PLTs are cached separately from deps/_build: they're expensive to
      # rebuild (whole-OTP + whole-deps type analysis) but only need to be
      # invalidated when dependencies change, same key as the deps cache.
      - name: Cache deps, _build, and PLTs
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
            priv/plts
          key: ${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-dialyzer-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ env.ELIXIR_VERSION }}-${{ env.OTP_VERSION }}-dialyzer-

      - name: Fetch dependencies
        run: mix deps.get

      - name: Run dialyzer
        run: mix dialyzer
